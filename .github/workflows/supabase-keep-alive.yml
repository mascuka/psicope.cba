name: Supabase Keep Alive

on:
  schedule:
    # Cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  keep_active:
    runs-on: ubuntu-latest

    steps:

      - name: Limpiar tabla de mantenimiento
        run: |
          curl -X DELETE "${{ secrets.SUPABASE_URL }}/rest/v1/_maintenance_ping?id=gt.0" \
          -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Content-Type: application/json"

      - name: Insertar 5 registros
        run: |
          for i in {1..5}
          do
            echo "Insertando registro $i..."

            curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/_maintenance_ping" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{ \"last_ping\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\" }"

            sleep 1
          done

      - name: Finalizado
        run: echo "Keep Alive ejecutado correctamente."
